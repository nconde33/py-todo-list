<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO List</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      color: #333;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 2rem;
      color: #2c3e50;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    /* New-todo form */
    #new-todo-form {
      display: flex;
      flex-direction: column;
      gap: .6rem;
      background: #fff;
      padding: 1.2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      margin-bottom: 1.5rem;
    }

    #new-todo-form input,
    #new-todo-form textarea {
      width: 100%;
      padding: .55rem .8rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: .95rem;
      resize: vertical;
    }

    #new-todo-form button {
      align-self: flex-end;
      padding: .55rem 1.4rem;
      background: #3498db;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .95rem;
      transition: background .2s;
    }

    #new-todo-form button:hover { background: #2980b9; }

    /* Filters */
    #filters {
      display: flex;
      gap: .5rem;
      margin-bottom: 1rem;
    }

    #filters button {
      flex: 1;
      padding: .45rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: .9rem;
      transition: background .2s, color .2s;
    }

    #filters button.active {
      background: #3498db;
      color: #fff;
      border-color: #3498db;
    }

    /* Todo list */
    #todo-list { list-style: none; display: flex; flex-direction: column; gap: .7rem; }

    .todo-item {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,.07);
      padding: .9rem 1rem;
      display: flex;
      align-items: flex-start;
      gap: .8rem;
    }

    .todo-item.completed .todo-title { text-decoration: line-through; color: #999; }

    .todo-check {
      margin-top: .2rem;
      width: 1.1rem;
      height: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      accent-color: #27ae60;
    }

    .todo-body { flex: 1; min-width: 0; }

    .todo-title { font-weight: 600; font-size: 1rem; word-break: break-word; }

    .todo-desc {
      font-size: .88rem;
      color: #666;
      margin-top: .2rem;
      word-break: break-word;
    }

    .todo-meta {
      font-size: .78rem;
      color: #aaa;
      margin-top: .35rem;
    }

    .todo-actions { display: flex; gap: .4rem; flex-shrink: 0; }

    .btn-edit, .btn-delete {
      padding: .3rem .65rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: .82rem;
      transition: background .2s;
    }

    .btn-edit { background: #f39c12; color: #fff; }
    .btn-edit:hover { background: #d68910; }
    .btn-delete { background: #e74c3c; color: #fff; }
    .btn-delete:hover { background: #c0392b; }

    /* Edit modal */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    #modal-overlay.open { display: flex; }

    #modal {
      background: #fff;
      border-radius: 10px;
      padding: 1.5rem;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: .7rem;
      box-shadow: 0 8px 24px rgba(0,0,0,.15);
    }

    #modal h2 { font-size: 1.1rem; color: #2c3e50; }

    #modal input, #modal textarea {
      width: 100%;
      padding: .55rem .8rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: .95rem;
      resize: vertical;
    }

    #modal label { display: flex; align-items: center; gap: .5rem; font-size: .93rem; }

    .modal-buttons { display: flex; justify-content: flex-end; gap: .5rem; }

    .btn-save {
      padding: .5rem 1.2rem;
      background: #27ae60;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .9rem;
      transition: background .2s;
    }

    .btn-save:hover { background: #1e8449; }

    .btn-cancel {
      padding: .5rem 1.2rem;
      background: #95a5a6;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: .9rem;
      transition: background .2s;
    }

    .btn-cancel:hover { background: #7f8c8d; }

    #msg {
      text-align: center;
      padding: .7rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      display: none;
      font-size: .9rem;
    }

    #msg.success { background: #d5f5e3; color: #1e8449; display: block; }
    #msg.error   { background: #fde8e8; color: #c0392b; display: block; }

    #empty-msg {
      text-align: center;
      color: #aaa;
      padding: 2rem 0;
      display: none;
      font-size: .95rem;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>📝 TODO List</h1>

  <div id="msg"></div>

  <form id="new-todo-form">
    <input type="text" id="new-title" placeholder="Título *" required />
    <textarea id="new-desc" rows="2" placeholder="Descripción (opcional)"></textarea>
    <button type="submit">+ Agregar tarea</button>
  </form>

  <div id="filters">
    <button class="active" data-filter="all">Todas</button>
    <button data-filter="false">Pendientes</button>
    <button data-filter="true">Completadas</button>
  </div>

  <ul id="todo-list"></ul>
  <p id="empty-msg">No hay tareas. ¡Agrega una!</p>
</div>

<!-- Edit modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Editar tarea</h2>
    <input type="text" id="edit-title" placeholder="Título *" />
    <textarea id="edit-desc" rows="3" placeholder="Descripción (opcional)"></textarea>
    <label>
      <input type="checkbox" id="edit-completed" />
      Completada
    </label>
    <div class="modal-buttons">
      <button class="btn-cancel" id="btn-cancel-edit">Cancelar</button>
      <button class="btn-save" id="btn-save-edit">Guardar</button>
    </div>
  </div>
</div>

<script>
  const API = '/todos';
  let currentFilter = 'all';
  let editingId = null;

  function showMsg(text, type) {
    $('#msg').text(text).attr('class', type);
    setTimeout(() => $('#msg').hide().attr('class', ''), 3000);
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' })
      + ' ' + d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  }

  function renderTodo(todo) {
    const completedClass = todo.completed ? 'completed' : '';
    const checked = todo.completed ? 'checked' : '';
    const desc = todo.description
      ? `<div class="todo-desc">${$('<div>').text(todo.description).html()}</div>`
      : '';
    return `
      <li class="todo-item ${completedClass}" data-id="${todo.id}">
        <input type="checkbox" class="todo-check" ${checked} title="Marcar como ${todo.completed ? 'pendiente' : 'completada'}" />
        <div class="todo-body">
          <div class="todo-title">${$('<div>').text(todo.title).html()}</div>
          ${desc}
          <div class="todo-meta">Creado: ${formatDate(todo.created_at)}</div>
        </div>
        <div class="todo-actions">
          <button class="btn-edit">✏️</button>
          <button class="btn-delete">🗑️</button>
        </div>
      </li>`;
  }

  function loadTodos() {
    const url = currentFilter === 'all' ? `${API}/` : `${API}/?completed=${currentFilter}`;
    $.getJSON(url)
      .done(function (todos) {
        const $list = $('#todo-list').empty();
        if (todos.length === 0) {
          $('#empty-msg').show();
        } else {
          $('#empty-msg').hide();
          todos.forEach(t => $list.append(renderTodo(t)));
        }
      })
      .fail(function () {
        showMsg('Error al cargar las tareas.', 'error');
      });
  }

  // Create
  $('#new-todo-form').on('submit', function (e) {
    e.preventDefault();
    const title = $('#new-title').val().trim();
    if (!title) return;
    const data = { title };
    const desc = $('#new-desc').val().trim();
    if (desc) data.description = desc;

    $.ajax({
      url: `${API}/`,
      method: 'POST',
      contentType: 'application/json',
      data: JSON.stringify(data),
    })
      .done(function () {
        $('#new-title').val('');
        $('#new-desc').val('');
        showMsg('Tarea creada.', 'success');
        loadTodos();
      })
      .fail(function () {
        showMsg('Error al crear la tarea.', 'error');
      });
  });

  // Toggle complete
  $('#todo-list').on('change', '.todo-check', function () {
    const $item = $(this).closest('.todo-item');
    const id = $item.data('id');
    const completed = $(this).is(':checked');
    $.ajax({
      url: `${API}/${id}`,
      method: 'PUT',
      contentType: 'application/json',
      data: JSON.stringify({ completed }),
    })
      .done(function () { loadTodos(); })
      .fail(function () { showMsg('Error al actualizar.', 'error'); });
  });

  // Delete
  $('#todo-list').on('click', '.btn-delete', function () {
    const $item = $(this).closest('.todo-item');
    const id = $item.data('id');
    if (!confirm('¿Eliminar esta tarea?')) return;
    $.ajax({ url: `${API}/${id}`, method: 'DELETE' })
      .done(function () {
        showMsg('Tarea eliminada.', 'success');
        loadTodos();
      })
      .fail(function () { showMsg('Error al eliminar.', 'error'); });
  });

  // Open edit modal
  $('#todo-list').on('click', '.btn-edit', function () {
    const $item = $(this).closest('.todo-item');
    editingId = $item.data('id');
    $.getJSON(`${API}/${editingId}`)
      .done(function (todo) {
        $('#edit-title').val(todo.title);
        $('#edit-desc').val(todo.description || '');
        $('#edit-completed').prop('checked', todo.completed);
        $('#modal-overlay').addClass('open');
      })
      .fail(function () { showMsg('Error al cargar la tarea.', 'error'); });
  });

  // Save edit
  $('#btn-save-edit').on('click', function () {
    if (!editingId) return;
    const title = $('#edit-title').val().trim();
    if (!title) { showMsg('El título es obligatorio.', 'error'); return; }
    const data = {
      title,
      description: $('#edit-desc').val().trim() || null,
      completed: $('#edit-completed').is(':checked'),
    };
    $.ajax({
      url: `${API}/${editingId}`,
      method: 'PUT',
      contentType: 'application/json',
      data: JSON.stringify(data),
    })
      .done(function () {
        closeModal();
        showMsg('Tarea actualizada.', 'success');
        loadTodos();
      })
      .fail(function () { showMsg('Error al guardar.', 'error'); });
  });

  // Cancel edit
  $('#btn-cancel-edit').on('click', closeModal);
  $('#modal-overlay').on('click', function (e) {
    if (e.target === this) closeModal();
  });

  function closeModal() {
    $('#modal-overlay').removeClass('open');
    editingId = null;
  }

  // Filters
  $('#filters button').on('click', function () {
    $('#filters button').removeClass('active');
    $(this).addClass('active');
    currentFilter = $(this).data('filter');
    loadTodos();
  });

  // Initial load
  loadTodos();
</script>
</body>
</html>
